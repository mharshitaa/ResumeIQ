<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ResumeIQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>ResumeIQ</h1>
    <p class="subtitle">Upload a resume and compare it with a job description using AI</p>

    <form action="/match" method="post" enctype="multipart/form-data">

        <label class="label">Upload Resume (PDF / DOCX)</label>
        <input type="file" name="resume" required>

        <label class="label">Job Description</label>
        <textarea name="job_description"
                  placeholder="Paste the complete job description here..."
                  required></textarea>

        <button type="submit">Check Match Score</button>
    </form>

    {% if score %}
    <div class="result">
        <h2>Match Result</h2>
        <div class="score">{{ score }}%</div>
        <p class="category 
        {% if category == 'Great Match' %}great
        {% elif category == 'Good Match' %}good
        {% elif category == 'Average Match' %}average
        {% else %}poor{% endif %}
        ">
        {{ category }}
        </p>
    </div>
    {% endif %}
</div>

</body>
</html>
